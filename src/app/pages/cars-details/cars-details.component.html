@if (car) {
  <section class="py-8 sm:py-12 dark:bg-gray-900">
    <div class="max-w-5xl mx-auto px-4">
      <button (click)="goBack()" class="flex items-center gap-2 text-gray-500 dark:text-gray-400 hover:text-primary transition-colors mb-6 group">
        <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
        <span class="text-sm font-medium">Back to Cars</span>
      </button>
      <div class="bg-white dark:bg-gray-900 rounded-3xl overflow-hidden shadow-xl border border-gray-100 dark:border-gray-800">
        <div class="relative h-72 sm:h-96 lg:h-[28rem] overflow-hidden">
          <img [src]="car.image" [alt]="car.name" class="w-full h-full object-cover">
          <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent"></div>
          <div class="absolute bottom-6 left-6 right-6 flex items-end justify-between">
            <div>
              <h1 class="text-2xl sm:text-3xl font-extrabold text-white drop-shadow-lg">{{ car.name }}</h1>
              <p class="text-gray-200 text-sm mt-1">Available for rent</p>
            </div>
            <div class="bg-primary text-white px-5 py-2.5 rounded-xl font-bold text-lg shadow-lg">
              {{ car.price.toLocaleString() }} <span class="text-sm font-normal">{{ currency }}/day</span>
            </div>
          </div>
        </div>
        <div class="p-6 sm:p-10">
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2">
              <h2 class="text-xl font-bold text-gray-900 dark:text-white mb-4">Car Description</h2>
              <p class="text-gray-600 dark:text-gray-400 leading-relaxed text-base">{{ car.description }}</p>
            </div>
            <div class="space-y-4">
              <div class="bg-gray-50 dark:bg-gray-800 rounded-2xl p-5">
                <div class="flex items-center justify-between mb-4">
                  <span class="text-sm text-gray-500 dark:text-gray-400">Daily Price</span>
                  <span class="text-xl font-extrabold text-primary">{{ car.price.toLocaleString() }} {{ currency }}</span>
                </div>
                <div class="flex items-center justify-between mb-4">
                  <span class="text-sm text-gray-500 dark:text-gray-400">Available</span>
                  <span class="text-lg font-bold text-gray-900 dark:text-white flex items-center gap-1.5">
                    <span class="w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
                    {{ car.count }} cars
                  </span>
                </div>
                <div class="flex items-center justify-between">
                  <span class="text-sm text-gray-500 dark:text-gray-400">Status</span>
                  <span class="text-sm font-semibold text-emerald-600 bg-emerald-50 dark:bg-emerald-900/30 px-3 py-1 rounded-full">Available Now</span>
                </div>
              </div>
              <button (click)="book()" class="w-full py-4 bg-primary text-white font-bold rounded-xl hover:bg-primary-dark transition-all shadow-xl shadow-primary/25 hover:scale-[1.02] text-lg">Book Now</button>
              <p class="text-center text-xs text-gray-400">You must be signed in to book</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
}
